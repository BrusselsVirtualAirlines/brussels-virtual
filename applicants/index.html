er-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;background:none;font-family:inherit;font-weight:700;padding:0;margin-bottom:24px;transition:color .2s}.back-list:hover{color:var(--white)}.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px}.stats-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}.stat-box{flex:1;min-width:120px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:16px;text-align:center}.stat-box .n{font-size:28px;font-weight:900;letter-spacing:-1px}.stat-box .l{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:4px}footer{position:relative;text-align:center;padding:24px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:600}.made-by{position:absolute;right:24px;top:50%;transform:translateY(-50%);text-align:right;line-height:1.5}.made-by span{display:block;font-size:9px;letter-spacing:1px;text-transform:none;color:rgba(255,255,255,.3);font-weight:600}.made-by span.for{font-size:8px;color:rgba(255,255,255,.18)}</style>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9xnFjctN_JGq6OKjW7NOg_oCog1rOrtBobHsV4Cp-ucLJnQK3GyfUzk_vuUlS9mHK/exec';

let apps = [];

window.addEventListener('DOMContentLoaded', () => {
  const token  = localStorage.getItem('bv_token');
  const expiry = parseInt(localStorage.getItem('bv_token_expiry') || '0');
  if (!token || Date.now() >= expiry) {
    window.location.href = 'https://www.brusselsvirtual.be/stafflogin/';
    return;
  }
  document.getElementById('logoutBtn').style.display = 'inline-flex';
  loadApplicants();
});

function logout() {
  localStorage.removeItem('bv_token');
  localStorage.removeItem('bv_token_expiry');
  window.location.href = 'https://www.brusselsvirtual.be/stafflogin/';
}

async function loadApplicants(force=false) {
  const cacheKey = 'bv_applicants_cache';
  const cached = sessionStorage.getItem(cacheKey);
  if (cached && !force) {
    apps = JSON.parse(cached);
    renderApplicants(apps);
    return;
  }
  document.getElementById('submissionList').innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Loading...</p>';
  try {
    const res  = await fetch(SCRIPT_URL + '?type=applicants');
    const rows = await res.json();
    apps = rows.map(r => ({
      _row:    r._row,
      date:    r.Date,
      name:    r.Name,
      email:   r.Email,
      ifc:     r.IFC,
      notes:   r.Notes,
      status:  r.Status || 'Pending',
      ifclink: r['IFC Link'] || ''
    })).sort((a,b) => new Date(b.date) - new Date(a.date));
    sessionStorage.setItem(cacheKey, JSON.stringify(apps));
    renderApplicants(apps);
  } catch(e) {
    document.getElementById('submissionList').innerHTML = `<p style="color:#ff6680;text-align:center;padding:40px">Could not load applicants: ${e.message}</p>`;
  }
}

function statusColor(s) {
  return s === 'Accepted' ? '#4dffaa' : s === 'Rejected' ? '#ff6680' : '#ffaa00';
}

function statusBtns(i, current) {
  return ['Pending','Accepted','Rejected'].map(s => {
    const active = s === current;
    const c = statusColor(s);
    return `<button onclick="event.stopPropagation();setStatus(${i},'${s}')" style="background:${active ? c+'33' : 'rgba(255,255,255,0.05)'};border:1px solid ${active ? c : 'rgba(255,255,255,0.15)'};color:${active ? c : 'var(--muted)'};font-family:'Nunito Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border-radius:5px;cursor:pointer;transition:all .2s">${s}</button>`;
  }).join('');
}

function renderApplicants(data) {
  const stats = document.getElementById('statsRow');
  const el    = document.getElementById('submissionList');

  document.getElementById('refreshBtn')?.remove();
  const refreshBtn = document.createElement('button');
  refreshBtn.id = 'refreshBtn';
  refreshBtn.className = 'btn-red';
  refreshBtn.style.cssText = 'width:auto;padding:10px 24px;margin-bottom:16px;font-size:10px';
  refreshBtn.textContent = '↻ Refresh';
  refreshBtn.onclick = () => loadApplicants(true);
  document.getElementById('listSection').insertBefore(refreshBtn, stats);

  const pending  = data.filter(a => !a.status || a.status === 'Pending').length;
  const accepted = data.filter(a => a.status === 'Accepted').length;
  const rejected = data.filter(a => a.status === 'Rejected').length;

  stats.innerHTML = `
    <div class="stat-box"><div class="n">${data.length}</div><div class="l">Total</div></div>
    <div class="stat-box"><div class="n" style="color:#ffaa00">${pending}</div><div class="l">Pending</div></div>
    <div class="stat-box"><div class="n" style="color:#4dffaa">${accepted}</div><div class="l">Accepted</div></div>
    <div class="stat-box"><div class="n" style="color:#ff6680">${rejected}</div><div class="l">Rejected</div></div>`;

  if (!data.length) { el.innerHTML = '<div class="empty">No applications yet.</div>'; return; }

  el.innerHTML = data.map((a, i) => {
    const c = statusColor(a.status || 'Pending');
    return `
    <div class="card" style="cursor:default;flex-wrap:wrap;gap:12px">
      <div onclick="showDetail(${i})" style="cursor:pointer;flex:1;min-width:200px">
        <h3>${a.name}</h3>
        <p>${a.ifc} · ${a.email}</p>
        <p style="margin-top:4px">${new Date(a.date).toLocaleString('nl-BE')}</p>
        ${a.notes && a.notes !== '(none)' ? `<p style="margin-top:6px;font-size:12px;font-style:italic;color:rgba(255,255,255,0.55)">"${a.notes}"</p>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
        <div class="badge" style="color:${c};background:${c}22;border:1px solid ${c}55;font-size:10px;padding:4px 12px">${a.status || 'Pending'}</div>
        ${a.ifclink ? `<a href="${a.ifclink}" target="_blank" onclick="event.stopPropagation()" style="color:var(--red);font-size:9px;font-weight:700;letter-spacing:1px;text-decoration:none">IFC PROFILE →</a>` : ''}
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">${statusBtns(i, a.status || 'Pending')}</div>
        <button onclick="event.stopPropagation();archiveApplicant(${i})" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:var(--muted);font-family:'Nunito Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;border-radius:5px;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(225,0,42,0.15)';this.style.borderColor='rgba(225,0,42,0.4)';this.style.color='#ff6680'" onmouseout="this.style.background='rgba(255,255,255,0.05)';this.style.borderColor='rgba(255,255,255,0.15)';this.style.color='var(--muted)'">Archive</button>
      </div>
    </div>`;
  }).join('');
}

function showDetail(i) {
  const a = apps[i];
  document.getElementById('listSection').style.display   = 'none';
  document.getElementById('detailSection').style.display = 'block';
  const c = statusColor(a.status || 'Pending');

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-view">
      <h2>${a.name}</h2>
      <div class="meta">${a.ifc} · ${a.email} · Applied: ${new Date(a.date).toLocaleString('nl-BE')}</div>
      <div class="stats-row">
        <div class="stat-box"><div class="n" style="color:${c};font-size:16px">${a.status || 'Pending'}</div><div class="l">Status</div></div>
        ${a.ifclink ? `<div class="stat-box"><div class="n" style="font-size:14px"><a href="${a.ifclink}" target="_blank" style="color:var(--red);text-decoration:none">View →</a></div><div class="l">IFC Profile</div></div>` : ''}
      </div>
      ${a.notes && a.notes !== '(none)' ? `<div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:20px;margin-bottom:20px;font-size:14px;font-style:italic;color:rgba(255,255,255,0.75)">"${a.notes}"</div>` : ''}
      <div style="margin-bottom:16px">
        <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px">Update Status</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">${['Pending','Accepted','Rejected'].map(s => {
          const active = s === (a.status || 'Pending');
          const sc = statusColor(s);
          return `<button onclick="setStatus(${i},'${s}')" style="background:${active ? sc+'33' : 'rgba(255,255,255,0.07)'};border:1px solid ${active ? sc : 'rgba(255,255,255,0.15)'};color:${active ? sc : 'var(--muted)'};font-family:'Nunito Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:10px 20px;border-radius:6px;cursor:pointer;transition:all .2s">${s}</button>`;
        }).join('')}</div>
      </div>
      <button onclick="archiveApplicant(${i})" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:var(--muted);font-family:'Nunito Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:10px 20px;border-radius:6px;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(225,0,42,0.15)';this.style.borderColor='rgba(225,0,42,0.4)';this.style.color='#ff6680'" onmouseout="this.style.background='rgba(255,255,255,0.05)';this.style.borderColor='rgba(255,255,255,0.15)';this.style.color='var(--muted)'">Archive applicant</button>
    </div>`;
}

const APPLY_WEBHOOK = 'https://discord.com/api/webhooks/1102653530034155691/ILWW-wh-zlhOtdXUzCHiu4ZjzxvTEmOXQ72ms_MdjSM9ZYgYuw2xPMglL5teZrMcfsFE';

// JSONP — enige betrouwbare manier om GAS te bereiken én respons te lezen
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const fn    = '_cb' + Date.now();
    const s     = document.createElement('script');
    const timer = setTimeout(() => { delete window[fn]; s.remove(); reject(new Error('Timeout')); }, 15000);
    s.src       = url + '&callback=' + fn;
    window[fn]  = data => { clearTimeout(timer); delete window[fn]; s.remove(); resolve(data); };
    s.onerror   = ()   => { clearTimeout(timer); delete window[fn]; s.remove(); reject(new Error('Load error')); };
    document.head.appendChild(s);
  });
}

async function setStatus(i, newStatus) {
  const a = apps[i];
  if (!a._row) { alert('Row not found — try refreshing.'); return; }

  // Update in spreadsheet via JSONP — betrouwbaar, bevestigt of het gelukt is
  try {
    const params = new URLSearchParams({
      action: 'updateStatus',
      row:    String(a._row),
      status: newStatus
    });
    await jsonp(SCRIPT_URL + '?' + params.toString());
  } catch(e) {
    console.error('Status update failed:', e);
    alert('Could not update status. Please try again.');
    return;
  }

  // Discord melding vanuit browser
  const color = newStatus === 'Accepted' ? 0x00c864 : newStatus === 'Rejected' ? 0xe1002a : 0xffaa00;
  const emoji = newStatus === 'Accepted' ? '✅' : newStatus === 'Rejected' ? '❌' : '⏳';
  const fields = [
    { name: 'Applicant',  value: a.name  || '?', inline: true },
    { name: 'IFC',        value: a.ifc   || '?', inline: true },
    { name: 'Email',      value: a.email || '?', inline: true },
    { name: 'New Status', value: newStatus,       inline: false }
  ];
  if (a.notes && a.notes !== '(none)') fields.push({ name: 'Notes', value: a.notes, inline: false });
  fetch(APPLY_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: 'ATLAS Application',
      embeds: [{ title: emoji + ' Application ' + newStatus, color, fields, timestamp: new Date().toISOString() }]
    })
  }).catch(err => console.error('Discord error:', err));

  // Update local cache en herlaad weergave
  apps[i].status = newStatus;
  sessionStorage.setItem('bv_applicants_cache', JSON.stringify(apps));
  const inDetail = document.getElementById('detailSection').style.display !== 'none';
  if (inDetail) showDetail(i);
  renderApplicants(apps);
}

async function archiveApplicant(i) {
  const a = apps[i];
  if (!a._row) { alert('Row not found — try refreshing.'); return; }
  if (!confirm(`Archive applicant "${a.name}"?`)) return;
  fetch(SCRIPT_URL + '?action=manualArchive&row=' + a._row, { mode: 'no-cors' }).catch(() => {});
  apps.splice(i, 1);
  sessionStorage.setItem('bv_applicants_cache', JSON.stringify(apps));
  showList();
  renderApplicants(apps);
}

function showList() {
  document.getElementById('detailSection').style.display = 'none';
  document.getElementById('listSection').style.display   = 'block';
}
</script>
