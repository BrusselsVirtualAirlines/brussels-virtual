er-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;background:none;font-family:inherit;font-weight:700;padding:0;margin-bottom:24px;transition:color .2s}.back-list:hover{color:var(--white)}.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px}.stats-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}.stat-box{flex:1;min-width:120px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:16px;text-align:center}.stat-box .n{font-size:28px;font-weight:900;letter-spacing:-1px}.stat-box .l{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:4px}footer{position:relative;text-align:center;padding:24px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:600}.made-by{position:absolute;right:24px;top:50%;transform:translateY(-50%);text-align:right;line-height:1.5}.made-by span{display:block;font-size:9px;letter-spacing:1px;text-transform:none;color:rgba(255,255,255,.3);font-weight:600}.made-by span.for{font-size:8px;color:rgba(255,255,255,.18)}</style>

<script>
const STAFF_PASS = 'BrusselsVA,01';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9xnFjctN_JGq6OKjW7NOg_oCog1rOrtBobHsV4Cp-ucLJnQK3GyfUzk_vuUlS9mHK/exec';

let submissions = [];

window.addEventListener('DOMContentLoaded', () => {
  const token  = localStorage.getItem('bv_token');
  const expiry = parseInt(localStorage.getItem('bv_token_expiry') || '0');
  const role   = localStorage.getItem('bv_role');
  if (!token || Date.now() >= expiry || !role) {
    window.location.href = 'https://www.brusselsvirtual.be/stafflogin/';
    return;
  }
  document.getElementById('logoutBtn').style.display = 'inline-flex';
  loadSubmissions();
});

function logout() {
  localStorage.removeItem('bv_token');
  localStorage.removeItem('bv_token_expiry');
  localStorage.removeItem('bv_role');
  localStorage.removeItem('bv_username');
  window.location.href = 'https://www.brusselsvirtual.be/stafflogin/';
}

async function loadSubmissions(force=false) {
  const cacheKey = 'bv_exam_cache';
  const cached = sessionStorage.getItem(cacheKey);
  if (cached && !force) {
    submissions = JSON.parse(cached);
    submissions.sort((a,b) => b.id - a.id);
    renderList();
    return;
  }
  document.getElementById('submissionList').innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Loading...</p>';
  try {
    const res  = await fetch(SCRIPT_URL);
    const rows = await res.json();
    submissions = rows.map(r => ({
      id:        new Date(r.Date).getTime(),
      _row:      r._row,
      date:      r.Date,
      name:      r.Name,
      email:     r.Email,
      ifc:       r.IFC,
      score:     r.Score,
      max:       r.Max,
      pct:       r.Max > 0 ? Math.round((r.Score / r.Max) * 100) : Math.round(parseFloat(r.Percentage) * (parseFloat(r.Percentage) <= 1 ? 100 : 1)),
      pass:      r.Result === 'PASSED',
      timeTaken: r['Time Used'],
      timeUp:    false,
      answers:   r.Answers || [],
      wrong:     r['Wrong Questions'] || ''
    }));
    submissions.sort((a,b) => b.id - a.id);
    sessionStorage.setItem(cacheKey, JSON.stringify(submissions));
    renderList();
  } catch(e) {
    document.getElementById('submissionList').innerHTML = `<p style="color:#ff6680;text-align:center;padding:40px">Could not load results: ${e.message}</p>`;
  }
}

function renderList() {
  const el    = document.getElementById('submissionList');
  const stats = document.getElementById('statsRow');
  const total  = submissions.length;
  const passed = submissions.filter(s => s.pass).length;
  const avgPct = total ? Math.round(submissions.reduce((a,s) => a + s.pct, 0) / total) : 0;

  document.getElementById('refreshBtn')?.remove();
  const refreshBtn = document.createElement('button');
  refreshBtn.id = 'refreshBtn';
  refreshBtn.className = 'btn-red';
  refreshBtn.style.cssText = 'width:auto;padding:10px 24px;margin-bottom:16px;font-size:10px';
  refreshBtn.textContent = '↻ Refresh';
  refreshBtn.onclick = () => loadSubmissions(true);
  document.getElementById('listSection').insertBefore(refreshBtn, stats);

  stats.innerHTML = `
    <div class="stat-box"><div class="n">${total}</div><div class="l">Total</div></div>
    <div class="stat-box"><div class="n" style="color:#4dffaa">${passed}</div><div class="l">Passed</div></div>
    <div class="stat-box"><div class="n" style="color:#ff6680">${total - passed}</div><div class="l">Failed</div></div>
    <div class="stat-box"><div class="n">${avgPct}%</div><div class="l">Avg Score</div></div>`;

  if (!total) { el.innerHTML = '<div class="empty">No exam submissions yet.</div>'; return; }

  el.innerHTML = submissions.map((s,i) => `
    <div class="card" style="cursor:default">
      <div class="card-left" onclick="showDetail(${i})" style="cursor:pointer;flex:1">
        <h3>${s.name}</h3>
        <p>${s.ifc} · ${s.email}</p>
        <p style="margin-top:4px">${new Date(s.date).toLocaleString('nl-BE')} · Time used: ${s.timeTaken}${s.timeUp ? ' ⏰' : ''}</p>
      </div>
      <div class="card-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
        <div onclick="showDetail(${i})" style="cursor:pointer;text-align:right">
          <div class="score-big">${s.pct}%</div>
          <div class="badge ${s.pass ? 'pass' : 'fail'}">${s.pass ? 'PASSED' : 'FAILED'}</div>
        </div>
        <button onclick="event.stopPropagation();archiveResult(${i})" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:var(--muted);font-family:'Nunito Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:6px 12px;border-radius:5px;cursor:pointer;white-space:nowrap;transition:all .2s" onmouseover="this.style.background='rgba(225,0,42,0.15)';this.style.borderColor='rgba(225,0,42,0.4)';this.style.color='#ff6680'" onmouseout="this.style.background='rgba(255,255,255,0.05)';this.style.borderColor='rgba(255,255,255,0.15)';this.style.color='var(--muted)'">
          Archive
        </button>
      </div>
    </div>`).join('');
}

function showDetail(i) {
  const s = submissions[i];
  document.getElementById('listSection').style.display   = 'none';
  document.getElementById('detailSection').style.display = 'block';

  const correctCount = Array.isArray(s.answers) ? s.answers.filter(a => a.correct).length : 0;
  const rows = Array.isArray(s.answers) && s.answers.length > 0 ? s.answers.map((a, qi) => {
    const chosen     = a.chosen >= 0 ? a.options[a.chosen] : '(no answer)';
    const correctAns = a.options[a.answer];
    const isCorrect  = a.correct;
    return `
      <div class="answer-row">
        <div class="ans-icon ${isCorrect ? 'c' : 'w'}">${isCorrect ? '✓' : '✗'}</div>
        <div class="ans-q">
          <div class="qtext">Q${qi+1}. ${a.question.substring(0,90)}${a.question.length>90?'...':''}${a.atc ? '<span class="atc-dot" title="ATC question"></span>' : ''}</div>
          <div class="chosen ${isCorrect ? '' : 'wrong'}">Answered: ${chosen}</div>
          ${!isCorrect ? `<div class="correct-ans">Correct: ${correctAns}</div>` : ''}
        </div>
      </div>`;
  }).join('') : `<p style="color:var(--muted);font-size:13px;padding:16px 0">No answer details available.${s.wrong ? '<br>Wrong questions: ' + s.wrong : ''}</p>`;

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-view">
      <h2>${s.name}</h2>
      <div class="meta">${s.ifc} · ${s.email} · ${new Date(s.date).toLocaleString('nl-BE')} · Time: ${s.timeTaken}${s.timeUp ? ' ⏰ (time expired)' : ''}</div>
      <div class="stats-row">
        <div class="stat-box"><div class="n">${s.score}/${s.max}</div><div class="l">Score</div></div>
        <div class="stat-box"><div class="n">${s.pct}%</div><div class="l">Percentage</div></div>
        <div class="stat-box"><div class="n">${correctCount}/20</div><div class="l">Correct</div></div>
        <div class="stat-box"><div class="n ${s.pass ? 'pass' : 'fail'}">${s.pass ? 'PASS' : 'FAIL'}</div><div class="l">Result</div></div>
      </div>
      <div>${rows}</div>
      <div style="margin-top:24px">
        <button onclick="archiveResult(${i})" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.2);color:var(--muted);font-family:'Nunito Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:10px 20px;border-radius:6px;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(225,0,42,0.15)';this.style.borderColor='rgba(225,0,42,0.4)';this.style.color='#ff6680'" onmouseout="this.style.background='rgba(255,255,255,0.07)';this.style.borderColor='rgba(255,255,255,0.2)';this.style.color='var(--muted)'">
          Archive this result
        </button>
      </div>
    </div>`;
}

async function archiveResult(i) {
  const s = submissions[i];
  if (!s._row) { alert('Row index not found — try refreshing.'); return; }
  if (!confirm(`Archive result for ${s.name}?`)) return;

  try {
    const archParams = new URLSearchParams({ action: 'archiveExamRow', row: String(s._row), actor: localStorage.getItem('bv_username') || 'unknown' });
    await fetch(SCRIPT_URL + '?' + archParams.toString(), { mode: 'no-cors' });
    // Remove from local list
    submissions.splice(i, 1);
    sessionStorage.setItem('bv_exam_cache', JSON.stringify(submissions));
    showList();
    renderList();
  } catch(e) {
    alert('Could not archive. Please try again.');
  }
}

function showList() {
  document.getElementById('detailSection').style.display = 'none';
  document.getElementById('listSection').style.display   = 'block';
}
</script>
</body>
</html>
