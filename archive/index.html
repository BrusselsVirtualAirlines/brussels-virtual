<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9xnFjctN_JGq6OKjW7NOg_oCog1rOrtBobHsV4Cp-ucLJnQK3GyfUzk_vuUlS9mHK/exec';

window.addEventListener('DOMContentLoaded', () => {
  const token  = localStorage.getItem('bv_token');
  const expiry = parseInt(localStorage.getItem('bv_token_expiry') || '0');
  if (!token || Date.now() >= expiry) {
    window.location.href = 'https://www.brusselsvirtual.be/stafflogin/';
    return;
  }
  document.getElementById('logoutBtn').style.display = 'inline-flex';
  loadArchive();
});

function logout() {
  localStorage.removeItem('bv_token');
  localStorage.removeItem('bv_token_expiry');
  window.location.href = 'https://www.brusselsvirtual.be/stafflogin/';
}

async function loadArchive(force=false) {
  const cacheKey = 'bv_archive_cache';
  const cached = sessionStorage.getItem(cacheKey);
  if (cached && !force) {
    renderArchive(JSON.parse(cached));
    return;
  }
  document.getElementById('submissionList').innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Loading...</p>';
  try {
    const res  = await fetch(SCRIPT_URL + '?type=archive');
    const rows = await res.json();
    const items = rows.map(r => ({
      date:       r.Date,
      name:       r.Name,
      email:      r.Email,
      ifc:        r.IFC,
      notes:      r.Notes,
      status:     r.Status || 'Pending',
      archivedOn: r['Archived On'],
      ifclink:    r['IFC Link'] || ''
    })).sort((a,b) => new Date(b.archivedOn) - new Date(a.archivedOn));
    sessionStorage.setItem(cacheKey, JSON.stringify(items));
    renderArchive(items);
  } catch(e) {
    document.getElementById('submissionList').innerHTML = `<p style="color:#ff6680;text-align:center;padding:40px">Could not load archive: ${e.message}</p>`;
  }
}

function renderArchive(items) {
  const stats = document.getElementById('statsRow');
  const el    = document.getElementById('submissionList');

  document.getElementById('refreshBtn')?.remove();
  const refreshBtn = document.createElement('button');
  refreshBtn.id = 'refreshBtn';
  refreshBtn.className = 'btn-red';
  refreshBtn.style.cssText = 'width:auto;padding:10px 24px;margin-bottom:16px;font-size:10px';
  refreshBtn.textContent = '↻ Refresh';
  refreshBtn.onclick = () => loadArchive(true);
  document.getElementById('listSection').insertBefore(refreshBtn, stats);

  const accepted = items.filter(a => a.status === 'Accepted').length;
  const rejected = items.filter(a => a.status === 'Rejected').length;
  const pending  = items.filter(a => a.status === 'Pending' || !a.status).length;

  stats.innerHTML = `
    <div class="stat-box"><div class="n">${items.length}</div><div class="l">Total</div></div>
    <div class="stat-box"><div class="n" style="color:#4dffaa">${accepted}</div><div class="l">Accepted</div></div>
    <div class="stat-box"><div class="n" style="color:#ff6680">${rejected}</div><div class="l">Rejected</div></div>
    <div class="stat-box"><div class="n" style="color:#ffaa00">${pending}</div><div class="l">Pending</div></div>`;

  if (!items.length) { el.innerHTML = '<div class="empty">Archive is empty.</div>'; return; }

  el.innerHTML = items.map((a, i) => {
    const statusColor = a.status === 'Accepted' ? '#4dffaa' : a.status === 'Rejected' ? '#ff6680' : '#ffaa00';
    return `
    <div class="card" onclick="showDetail(${i})">
      <div class="card-left">
        <h3>${a.name}</h3>
        <p>${a.ifc} · ${a.email}</p>
        <p style="margin-top:4px">Applied: ${new Date(a.date).toLocaleString('nl-BE')}</p>
        <p style="margin-top:2px;font-size:10px;color:var(--muted)">Archived: ${new Date(a.archivedOn).toLocaleString('nl-BE')}</p>
        ${a.notes && a.notes !== '(none)' ? `<p style="margin-top:6px;font-style:italic;color:rgba(255,255,255,0.6)">"${a.notes}"</p>` : ''}
      </div>
      <div class="card-right">
        <div class="badge" style="color:${statusColor};background:${statusColor}22;border:1px solid ${statusColor}55;font-size:10px;padding:4px 12px">${a.status || 'Pending'}</div>
        ${a.ifclink ? `<div style="margin-top:8px"><a href="${a.ifclink}" target="_blank" style="color:var(--red);font-size:10px;font-weight:700;letter-spacing:1px;text-decoration:none">IFC PROFILE →</a></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function showDetail(i) {
  const items = JSON.parse(sessionStorage.getItem('bv_archive_cache') || '[]');
  const a = items[i];
  document.getElementById('listSection').style.display   = 'none';
  document.getElementById('detailSection').style.display = 'block';

  const statusColor = a.status === 'Accepted' ? '#4dffaa' : a.status === 'Rejected' ? '#ff6680' : '#ffaa00';

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-view">
      <h2>${a.name}</h2>
      <div class="meta">${a.ifc} · ${a.email}</div>
      <div class="stats-row">
        <div class="stat-box"><div class="n" style="color:${statusColor}">${a.status || 'Pending'}</div><div class="l">Status</div></div>
        <div class="stat-box"><div class="n" style="font-size:13px">${new Date(a.date).toLocaleDateString('nl-BE')}</div><div class="l">Applied</div></div>
        <div class="stat-box"><div class="n" style="font-size:13px">${new Date(a.archivedOn).toLocaleDateString('nl-BE')}</div><div class="l">Archived</div></div>
        ${a.ifclink ? `<div class="stat-box"><div class="n" style="font-size:14px"><a href="${a.ifclink}" target="_blank" style="color:var(--red);text-decoration:none">View →</a></div><div class="l">IFC Profile</div></div>` : ''}
      </div>
      ${a.notes && a.notes !== '(none)' ? `<div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:20px;margin-top:8px;font-size:14px;font-style:italic;color:rgba(255,255,255,0.75)">"${a.notes}"</div>` : ''}
    </div>`;
}

function showList() {
  document.getElementById('detailSection').style.display = 'none';
  document.getElementById('listSection').style.display   = 'block';
}
</script>
</body>
</html>
